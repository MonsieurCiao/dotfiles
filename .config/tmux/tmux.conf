#Status bar
set -g status-style bg=default,fg=black,bright
# set -g status-left ""
#status bar windows
# set -g window-status-format " #W "
# set -g window-status-current-format " #W "

set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta\#,nobold}"
set -g window-status-bell-style "fg=red,nobold"

# Pane seperators
set -g pane-border-lines simple

#options
set -g renumber-windows on
set -g mouse on
set -g history-limit 10000

#keybindings
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind-key x kill-pane
bind -n M-Left previous-window
bind -n M-Right next-window
unbind -T root %
unbind -T root '#'
bind % list-buffers
bind 'ö' split-window -h -c "#{pane_current_path}"
bind 'ä' split-window -v -c "#{pane_current_path}"

#keybindings popups
bind C-n display-popup -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'

bind-key "k" display-popup -E -w 40% "sesh connect \"$(
	sesh list -i | gum filter --limit 1 --placeholder 'Pick a sesh' --prompt='⚡'
)\""

#plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'erikw/tmux-powerline'
# set -g @plugin "janoamaral/tokyo-night-tmux"
# set -g @plugin 'chriszarate/tmux-tasks'

# set -g status-right '#{tasks_status}'
# # Task manager
# set -g @tasks_manager 'taskwarrior'
#
# # Colors
# set -g @tasks_format_begin '#[fg=white,bg=colour236]'
# set -g @tasks_format_end '#[fg=white,bg=black]'
#
# # Icons
# set -g @tasks_icon_urgent '⧗ '
# set -g @tasks_icon_outstanding '+'


set -g @plugin "omerxx/tmux-sessionx"

#sessionx settings
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles/'
set -g @sessionx-fzf-builtin-tmux 'on'



set -g @tokyo-night-tmux_transparent 1 # transparent background
set -g @tokyo-night-tmux_show_hostname 0        # machine hostname
set -g @tokyo-night-tmux_window_id_style none   # window tab numbers
set -g @tokyo-night-tmux_pane_id_style hide

set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_date_format DMY
set -g @tokyo-night-tmux_time_format 24H

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/dotfiles/.config/tmux/plugins/tpm/tpm'
